<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
<main>
  <div class="container">
    <article class="card">
       <section class="card-img">
         <img src="" alt="card image">
       </section>
       <section class="card-body">
         <p class="category">Learning</p>
         <p class="date"> Publish 21 Dec 2023</p>
         <h3 class="card-title">HTML & CSS foundations</h3>
         <p class="card-text"> These languages are the backbone of every website, defining structure, content and presentation</p>
       </section>
       <section class="card-footer">
         <img src="" alt="avatar">
         <h4 class="autor">Greg Hooper</h4>
       </section>
    </article>
  </div>
</main>
 
</body>
</html>
