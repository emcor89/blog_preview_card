<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" type="text/css" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

</head>
<body>
<main>
  <div class="card-container">
    <article class="card">
       <section class="card-img">
         <img src="./assets/images/illustration-article.svg" alt="Article illustration" width="336" height="201">
       </section>
       <section class="card-body">
        <div class="category-container">
          <p class="category">Learning</p>
        </div>
        <p class="date"> Published 21 Dec 2023</p>
        <h3 class="title">HTML & CSS foundations</h3>
        <p class="text"> These languages are the backbone of every website, defining structure, content and presentation</p>
       </section>
       <section class="card-footer">
        <img src="./assets/images/image-avatar.webp" alt="avatar">
         <h4 class="autor">Greg Hooper</h4>
       </section>
    </article>
  </div>
</main>
 
</body>
</html>
